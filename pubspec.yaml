name: brief_ai
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_intl: ^0.0.1
  flutter_lints: ^6.0.0
  flutter_local_notifications: ^20.1.0
  flutter_localizations:
    sdk: flutter
  image_picker: ^1.2.1
  intl: ^0.20.2
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  timezone: ^0.10.1
  flutter_timezone: ^4.0.1
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/lang/en.json
    - assets/lang/de.json
    - assets/lang/ar.json
    - assets/docs/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"